<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Threat Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: grey;
            color: bisque;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: black; }
        p.subtitle { color: #888; margin-bottom: 2rem; }
        .input-box { display: flex; gap: 10px; margin-bottom: 2rem; }
        input {
            flex: 1; padding: 14px 18px; border-radius: 8px;
            border: 1px solid #333; background: white;
            font-size: 1rem; outline: none;
        }
        input:focus { border-color: aquamarine; }
        button {
            padding: 14px 24px; background: #00ff88; color: #000;
            border: none; border-radius: 8px; font-size: 1rem;
            font-weight: bold; cursor: pointer;
        }
        button:hover { background: #00cc6a; }
        .result { padding: 24px; border-radius: 12px; display: none; }
        .result.malicious { background: #2a0a0a; border: 1px solid #ff4444; }
        .result.benign { background: #0a2a0a; border: 1px solid #00ff88; }
        .result h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .result.malicious h2 { color: #ff4444; }
        .result.benign h2 { color: #00ff88; }
        .result p { color: #aaa; }
        .loading { color: #888; display: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ URL Threat Detector</h1>
        <p class="subtitle">Paste any URL to check</p>

        <div class="input-box">
            <input type="text" id="urlInput" placeholder="https://example.com"/>
            <button onclick="checkURL()">Check</button>
        </div>
        <p class="loading" id="loading">Analyzing...</p>
        <div class="result" id="result">
            <h2 id="resultTitle"></h2>
            <p id="resultURL"></p>
            <p id="resultConfidence"></p>
        </div>

        <div style="margin-top: 2rem;">
            <p class="subtitle">Or scan an entire webpage for suspicious links</p>
            <div class="input-box">
                <input type="text" id="scanInput" placeholder="https://example.com"/>
                <button onclick="scanPage()">Scan Page</button>
            </div>
            <div id="scanResult" style="display:none; text-align:left;">
                <p id="scanSummary" style="margin-bottom:1rem; color:#aaa;"></p>
                <div id="scanLinks"></div>
            </div>
        </div>
    </div>

    <script>
        async function checkURL() {
            const url = document.getElementById("urlInput").value.trim();
            if (!url) return;

            document.getElementById("loading").style.display = "block";
            document.getElementById("result").style.display = "none";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();

                document.getElementById("loading").style.display = "none";
                const resultDiv = document.getElementById("result");
                resultDiv.style.display = "block";
                resultDiv.className = "result " + data.prediction;
                document.getElementById("resultTitle").textContent =
                    data.prediction === "malicious" ? "⚠️ Malicious URL Detected" : "✅ URL Looks Safe";
                document.getElementById("resultURL").textContent = "URL: " + data.url;
                document.getElementById("resultConfidence").textContent =
                    "Confidence: " + data.confidence + "%";

            } catch (error) {
                document.getElementById("loading").style.display = "none";
                alert("Error: " + error.message);
            }
        }

        async function scanPage() {
            const url = document.getElementById("scanInput").value.trim();
            if (!url) return;  
            document.getElementById("scanResult").style.display = "none";

            try {
                const response = await fetch("/scan", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();

                document.getElementById("scanResult").style.display = "block";
                document.getElementById("scanSummary").textContent = `Found ${data.total} links — ${data.malicious_count} malicious, ${data.benign_count} safe`;

                const linksDiv = document.getElementById("scanLinks");
                linksDiv.innerHTML = "";

                if(!data.results || data.results.length === 0){
                    document.getElementById("scanSummary").style.display="block";
                    document.getElementById("scanLinks").innerHTML = '<p style="color:var(--muted); font-family:var(--mono); font-size_0.8rem;">No links found or page blocked the request.</p>';
                    return;
                }
                data.results.forEach(item => {
                    const div = document.createElement("div");
                    div.style.cssText = `
                        padding: 10px 14px;
                        margin-bottom: 8px;
                        border-radius: 8px;
                        font-size: 0.85rem;
                        background: ${item.prediction === "malicious" ? "#2a0a0a" : "#0a2a0a"};
                        border: 1px solid ${item.prediction === "malicious" ? "#ff4444" : "#00ff88"};
                        color: ${item.prediction === "malicious" ? "#ff4444" : "#00ff88"};
                        word-break: break-all;
                        `;
                    div.textContent = `${item.prediction === "malicious" ? "⚠️" : "✅"} ${item.url} (${item.confidence}%)`;
                    linksDiv.appendChild(div);
                });

            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        document.getElementById("urlInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkURL();
        });
    </script>
</body>
</html>
